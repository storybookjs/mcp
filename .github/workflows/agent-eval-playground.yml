name: Agent eval playground

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Vercel deployment target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

env:
  TURBO_ENV_MODE: loose
  VERCEL_PROJECT_NAME: project-mi8oz

jobs:
  deploy:
    name: Deploy playground
    if: >-
      github.event_name != 'pull_request' ||
      !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install

      - name: Resolve Vercel target
        id: target
        shell: bash
        run: |
          target="preview"

          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            target="production"
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
          fi

          case "$target" in
            preview)
              echo "environment=preview" >> "$GITHUB_OUTPUT"
              echo "build_flags=--target=preview" >> "$GITHUB_OUTPUT"
              echo "deploy_flags=--target=preview" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "build_flags=--prod" >> "$GITHUB_OUTPUT"
              echo "deploy_flags=--prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error title=Invalid target::Expected preview or production, got '$target'."
              exit 1
              ;;
          esac

          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Validate Vercel credentials
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          missing=0

          for name in VERCEL_TOKEN VERCEL_TEAM_ID; do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Missing Vercel secret::$name is required to deploy the agent eval playground."
              missing=1
            fi
          done

          exit "$missing"

      - name: Link Vercel project
        working-directory: agent-eval
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: pnpm exec vercel link --yes --team "$VERCEL_TEAM_ID" --project "$VERCEL_PROJECT_NAME" --token "$VERCEL_TOKEN"

      - name: Pull Vercel environment
        working-directory: agent-eval
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [[ "${{ steps.target.outputs.environment }}" == "production" ]]; then
            pnpm exec vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          else
            branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
            pnpm exec vercel pull --yes --environment=preview --git-branch "$branch" --token "$VERCEL_TOKEN"
          fi

      - name: Build playground
        working-directory: agent-eval
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm exec vercel build --yes ${{ steps.target.outputs.build_flags }} --token "$VERCEL_TOKEN"

      - name: Deploy playground
        id: deploy
        working-directory: agent-eval
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deploy_output="$(pnpm exec vercel deploy --prebuilt ${{ steps.target.outputs.deploy_flags }} --token "$VERCEL_TOKEN")"
          printf '%s\n' "$deploy_output"

          url="$(
            printf '%s\n' "$deploy_output" |
              awk '/https:\/\// { match($0, /https:\/\/[^[:space:]]+/); if (RSTART) found=substr($0,RSTART,RLENGTH) } END { print found }'
          )"

          if [[ -z "$url" ]]; then
            echo "::error title=Missing deployment URL::Vercel deploy did not print a deployment URL."
            exit 1
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        run: |
          {
            echo "### Agent eval playground"
            echo
            echo "- Target: \`${{ steps.target.outputs.target }}\`"
            echo "- Project: \`$VERCEL_PROJECT_NAME\`"
            echo "- URL: ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
