name: Run evals and Update PR with Results

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional PR number to run evals against. Leave empty to run on the selected branch.
        required: false
        type: string
      runs:
        description: Number of runs per eval fixture (defaults to 1).
        required: false
        default: '1'
        type: string

jobs:
  run-evals:
    name: Run evals
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.label.name == 'ci:eval' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # V7
        with:
          ref: ${{ github.event.pull_request.head.ref || (github.event.inputs.pr_number && format('refs/pull/{0}/head', github.event.inputs.pr_number)) || github.ref_name }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #6,4,0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v11,7,0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run evals
        id: evals
        continue-on-error: true
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          EVAL_RUNS: ${{ github.event.inputs.runs || '1' }}
        run: |
          set +e
          status=0

          while IFS= read -r experiment_file; do
            experiment="$(basename "$experiment_file" .ts)"
            echo "::group::agent-eval ${experiment}"
            pnpm --dir vercel-evals run eval "$experiment"
            experiment_status=$?
            echo "::endgroup::"

            if [ "$experiment_status" -ne 0 ]; then
              status=1
            fi
          done < <(find vercel-evals/experiments -maxdepth 1 -name '*.ts' -print | sort)

          pnpm --dir vercel-evals run export-results
          export_status=$?

          if [ "$export_status" -ne 0 ]; then
            status=1
          fi

          exit "$status"

      - name: Comment eval results
        if: always() && (github.event_name == 'pull_request' || github.event.inputs.pr_number != '')
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        with:
          script: |
            const { default: commentEvalResults } = await import(
              `${process.env.GITHUB_WORKSPACE}/.github/scripts/comment-eval-results.mjs`
            );
            await commentEvalResults({ github, context, core });

      - name: Commit eval results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if [ ! -f vercel-evals/agent-results.json ]; then
            echo "No exported eval results found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vercel-evals/agent-results.json vercel-evals/README.md

          if git diff --cached --quiet; then
            echo "No eval result changes to commit."
            exit 0
          fi

          git commit -m "chore: update eval results [skip ci]"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" \
            push origin "HEAD:${TARGET_REF}"

      - name: Check eval result
        if: always() && steps.evals.outcome != 'success'
        run: exit 1
