name: Agent eval

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  workflow_dispatch:

env:
  TURBO_ENV_MODE: loose

jobs:
  eval:
    name: Run agent eval experiments
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.head.repo.fork &&
        contains(github.event.pull_request.labels.*.name, 'ci:eval'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install

      - name: Build local MCP packages
        run: pnpm --filter @storybook/addon-mcp... run build

      - name: Type check agent eval config
        run: pnpm --dir agent-eval run typecheck

      - name: Run all experiments
        run: |
          set +e
          pnpm --dir agent-eval run eval
          status=$?
          mkdir -p agent-eval/results
          echo "$status" > agent-eval/results/.agent-eval-exit-code
          exit 0
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Report eval results
        run: pnpm --dir agent-eval run eval:report

      - name: Archive eval results
        if: always()
        run: |
          if [ -d agent-eval/results ]; then
            tar -czf agent-eval-results.tgz -C agent-eval results
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-eval-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: agent-eval-results.tgz
          if-no-files-found: ignore
          retention-days: 14
