name: Agent eval

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  workflow_dispatch:

env:
  TURBO_ENV_MODE: loose
  VERCEL_PROJECT_NAME: storybook-evals

jobs:
  eval:
    name: Run agent eval experiments
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.head.repo.fork &&
        contains(github.event.pull_request.labels.*.name, 'ci:eval'))
    runs-on: ubuntu-latest
    environment:
      # Keep this rule in sync with the Resolve Vercel target step below.
      # GitHub evaluates environment.name before step outputs exist.
      name: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy_playground.outputs.url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install

      - name: Build local MCP packages
        run: pnpm --filter @storybook/addon-mcp... run build

      - name: Type check agent eval config
        run: pnpm --dir agent-eval run typecheck

      - name: Check playground route shims
        run: pnpm --dir agent-eval run playground:check-routes

      - name: Validate Vercel credentials
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          missing=0

          for name in VERCEL_TOKEN VERCEL_TEAM_ID; do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Missing Vercel secret::$name is required to deploy the agent eval playground."
              missing=1
            fi
          done

          exit "$missing"

      - name: Run all experiments
        id: run_evals
        run: pnpm --dir agent-eval run eval
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Check eval results
        if: ${{ always() }}
        id: check_results
        shell: bash
        run: |
          if [[ ! -d agent-eval/results ]]; then
            echo "::error title=Missing eval results::Expected agent-eval/results to exist before deploying the playground."
            exit 1
          fi

          if ! find agent-eval/results -type f -print -quit | grep -q .; then
            echo "::error title=No eval result files::Expected agent-eval/results to contain files before deploying the playground."
            exit 1
          fi

          echo "has_result_files=true" >> "$GITHUB_OUTPUT"

      - name: Resolve Vercel target
        if: ${{ always() && steps.check_results.outputs.has_result_files == 'true' }}
        id: vercel_target
        shell: bash
        run: |
          # Keep this rule in sync with jobs.eval.environment.name above.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
          else
            echo "target=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Link Vercel project
        if: ${{ always() && steps.check_results.outputs.has_result_files == 'true' }}
        working-directory: agent-eval
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: pnpm exec vercel link --yes --team "$VERCEL_TEAM_ID" --project "$VERCEL_PROJECT_NAME" --token "$VERCEL_TOKEN"

      - name: Pull Vercel environment
        if: ${{ always() && steps.check_results.outputs.has_result_files == 'true' }}
        working-directory: agent-eval
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [[ "${{ steps.vercel_target.outputs.target }}" == "production" ]]; then
            pnpm exec vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          else
            branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
            pnpm exec vercel pull --yes --environment=preview --git-branch "$branch" --token "$VERCEL_TOKEN"
          fi

      - name: Build playground
        if: ${{ always() && steps.check_results.outputs.has_result_files == 'true' }}
        working-directory: agent-eval
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm exec vercel build --yes --target=${{ steps.vercel_target.outputs.target }} --token "$VERCEL_TOKEN"

      - name: Deploy playground
        if: ${{ always() && steps.check_results.outputs.has_result_files == 'true' }}
        id: deploy_playground
        working-directory: agent-eval
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deploy_output="$(pnpm exec vercel deploy --prebuilt --yes --target=${{ steps.vercel_target.outputs.target }} --token "$VERCEL_TOKEN")"
          printf '%s\n' "$deploy_output"

          url="$(
            printf '%s\n' "$deploy_output" |
              awk '/https:\/\/[^[:space:]]+\.vercel\.app/ { match($0, /https:\/\/[^[:space:]]+\.vercel\.app[^[:space:]]*/); if (RSTART) found=substr($0,RSTART,RLENGTH) } END { print found }'
          )"

          if [[ -z "$url" ]]; then
            echo "::error title=Missing deployment URL::Vercel deploy did not print a deployment URL."
            exit 1
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        if: ${{ always() && steps.check_results.outputs.has_result_files == 'true' }}
        run: |
          {
            echo "### Agent eval playground"
            echo
            echo "- Target: \`${{ steps.vercel_target.outputs.target }}\`"
            echo "- Project: \`$VERCEL_PROJECT_NAME\`"
            echo "- URL: ${{ steps.deploy_playground.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
